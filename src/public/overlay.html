<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qw-webhud · overlay</title>
  <link rel="stylesheet" href="/css/hud.css">
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
    /* checkerboard only when opened with ?bg=check, so you can see the transparent overlay in a normal tab */
    body.check { background:
      conic-gradient(#2a2a2a 25%, #1d1d1d 0 50%, #2a2a2a 0 75%, #1d1d1d 0) 0 0 / 40px 40px; }
  </style>
</head>
<body class="overlay">
  <div id="stage" class="stage"></div>
  <div id="dbg" class="dbg" hidden></div>
  <script type="module">
    import { Feed } from '/js/feed.js';
    import { Stage } from '/js/render.js';
    import { DEFAULT_SPEC } from '/js/specs.js';

    const params = new URLSearchParams(location.search);
    const bg = params.get('bg');
    if (bg === 'check') document.body.classList.add('check');
    // only a same-origin image asset path (prevents CSS-injection via the bg param)
    else if (bg && /^\/(?!\/)[\w./-]+\.(png|jpe?g|webp|gif)$/i.test(bg)) {   // single leading slash (same-origin; reject //host)
      document.body.style.backgroundColor = '#000';
      document.body.style.backgroundImage = `url("${bg}")`;
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundRepeat = 'no-repeat';
    }

    const stage = new Stage(document.getElementById('stage'));
    const feed = new Feed();

    // Spec: try the server's saved spec, else the built-in default.
    const specName = params.get('spec') || 'hub';
    let spec = DEFAULT_SPEC;
    try {
      const r = await fetch('/api/specs/' + encodeURIComponent(specName));
      if (r.ok) spec = await r.json();
    } catch {}
    stage.setSpec(spec);

    // optional theme: spec.meta.theme -> a body class + a webfont, loaded only for themed specs so the
    // default HUD stays dependency-free. Styling lives in hud.css (body.mc, body.br, ...).
    const THEMES = {
      minecraft:   { cls: 'mc', font: 'Press+Start+2P' },
      bladerunner: { cls: 'br', font: 'Orbitron:wght@500;700;900' },
    };
    const theme = THEMES[spec.meta?.theme];
    if (theme) {
      document.body.classList.add(theme.cls);
      const f = document.createElement('link');
      f.rel = 'stylesheet';
      f.href = 'https://fonts.googleapis.com/css2?family=' + theme.font + '&display=swap';
      document.head.appendChild(f);
    }

    // initial render from the last snapshot, so a fresh load / headless screenshot shows data
    // immediately (before the first WebSocket frame arrives).
    try { const r0 = await fetch('/api/snapshot'); if (r0.ok) { const s0 = await r0.json(); if (s0 && s0.seq != null) stage.update(s0); } } catch {}

    // debug readout (toggle with 'd')
    const dbg = document.getElementById('dbg');
    let showDbg = params.has('dbg');
    dbg.hidden = !showDbg;
    addEventListener('keydown', (e) => { if (e.key === 'd') { showDbg = !showDbg; dbg.hidden = !showDbg; } });
    function paintDbg(s) {
      if (!showDbg) return;
      dbg.textContent = `conn ${feed.connected ? 'ok' : '...'}  fps ${feed.fps}  age ${feed.age === Infinity ? '-' : feed.age.toFixed(0) + 'ms'}  seq ${s?.seq ?? '-'}  src ${s?.src ?? '-'}`;
    }

    // Render on each received frame, NOT via requestAnimationFrame: rAF is paused while the tab /
    // window is backgrounded (or behind the game), which would freeze the HUD. WebSocket messages
    // still fire when backgrounded. Throttle to ~display rate so a high-FPS engine can't flood the DOM.
    let lastPaint = 0;
    feed.onFrame((s) => {
      const now = performance.now();
      if (now - lastPaint < 14) return;   // cap ~70 fps
      lastPaint = now;
      stage.update(s);
      paintDbg(s);
    });
    feed.connect();
    setInterval(() => paintDbg(feed.getLatest()), 500); // keep the age field fresh if frames pause
  </script>
</body>
</html>
