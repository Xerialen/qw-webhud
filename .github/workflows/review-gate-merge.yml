name: Review Gate Merge

# Deterministic merge executor for the staged agent loop (free private plan; no
# branch protection required). NO LLM and NO API tokens; only GITHUB_TOKEN.
#
# It merges a PR ONLY when ALL hold:
#   - `gate: ready` label present; `gate: blocked` absent
#   - a top-level gate verdict comment says `LABEL: gate: ready` for the current
#     PR head SHA, so a stale ready label cannot authorize a newer commit
#   - PR open, non-draft, base `main` or `dev`, mergeable, and GitHub does not
#     report a hard merge-state blocker such as BLOCKED/DIRTY/BEHIND (the `dev`
#     integration branch auto-merges too, so the staged agent loop lands without
#     a manual "fallback merge"; a `dev`->`main` PR whose head is a long-lived
#     branch is never `--delete-branch`'d)
#   - every non-gate status check passing (this is where `pr-tests` — the
#     deterministic CI floor — is enforced)
#
# It re-evaluates on label events and completion of the `PR Tests` workflow, so
# a PR merges as soon as the LAST of {tests green, current-head gate ready}
# arrives. NOTE: `check_suite`/`check_run` are NOT used — GitHub does not emit
# those events for check suites created by GitHub Actions, so they'd never fire
# for `PR Tests`; `workflow_run` is the mechanism that does. Both
# `pull_request:labeled` and `issues:labeled` are handled because PR labels can
# arrive through either webhook surface depending on which API applies the label.
# Label/CI events that arrive inside the cooldown sleep once, then re-read GitHub
# state and re-evaluate the same PR. The schedule remains a best-effort backup for
# missed events, not the only path that can clear the cooldown. "Not ready yet" is
# silent (log only); it comments only on an actual merge.
#
# `ready_for_review` is intentionally NOT a merge trigger. Promoting a draft to
# ready is owned by Reset Review Gate (it sets `gate: reviewing`), so a draft that
# was mistakenly labeled `gate: ready` + given a SHA-bound verdict cannot auto-merge
# on promotion - otherwise the merge and reset jobs would race on that event at
# an unchanged head SHA. The event/schedule / PR Tests reconciler is also fail-closed:
# after a ready_for_review timeline event, both the gate-ready label event and
# the structured gate-ready verdict comment must be newer than that promotion.
# Merge acts only on explicit `labeled` / CI / schedule of an already-non-draft
# PR; the `draft == false` check below stays as defense in depth.

on:
  pull_request:
    types: [labeled, reopened]
  issues:
    types: [labeled]
  workflow_run:
    workflows: ["PR Tests"]
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read
  actions: read

concurrency:
  group: review-gate-merge-${{ github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  merge:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - name: Evaluate review gate and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT: ${{ github.event_name }}
          PR_FROM_LABEL: ${{ github.event.pull_request.number }}
          ISSUE_FROM_LABEL: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          # Which PR(s) to evaluate. Label/ready/reopen events carry one PR; a
          # completed `PR Tests` workflow_run references the PR(s) on its head
          # (fall back to matching open PRs by head SHA if the array is empty).
          # Schedule runs reconcile open PRs already labeled `gate: ready`.
          if [ "$EVENT" = "issues" ]; then
            is_pr=$(jq -r 'has("issue") and (.issue.pull_request != null)' "$GITHUB_EVENT_PATH")
            label=$(jq -r '.label.name // ""' "$GITHUB_EVENT_PATH")
            if [ "$is_pr" != "true" ] || [ "$label" != "gate: ready" ]; then
              echo "issues:labeled event is not a PR gate-ready label; nothing to do"
              exit 0
            fi
            PRS="$ISSUE_FROM_LABEL"
          elif [ "$EVENT" = "workflow_run" ]; then
            PRS=$(jq -r '.workflow_run.pull_requests[]?.number' "$GITHUB_EVENT_PATH" | sort -u)
            if [ -z "${PRS:-}" ]; then
              sha=$(jq -r '.workflow_run.head_sha' "$GITHUB_EVENT_PATH")
              PRS=$(gh pr list -R "$REPO" --state open --json number,headRefOid \
                    --jq ".[] | select(.headRefOid == \"$sha\") | .number")
            fi
          elif [ "$EVENT" = "schedule" ]; then
            PRS=$(gh pr list -R "$REPO" --state open --label "gate: ready" --json number --jq '.[].number')
          else
            label=$(jq -r '.label.name // ""' "$GITHUB_EVENT_PATH")
            if [ -n "$label" ] && [ "$label" != "gate: ready" ]; then
              echo "pull_request label is not gate: ready; nothing to do"
              exit 0
            fi
            PRS="$PR_FROM_LABEL"
          fi
          [ -n "${PRS:-}" ] || { echo "no PR in event; nothing to do"; exit 0; }

          gate_filter='["Review Gate Merge","Review Gate Labeler","Reset Review Gate","Gate Draft Guard"]'

          # Evaluate one PR; `return 0` = soft skip (log only, no comment).
          eval_and_merge() {
            local PR="$1"

            local data state draft base mergeable merge_state head head_ref short
            data=$(gh pr view "$PR" -R "$REPO" \
              --json state,isDraft,baseRefName,mergeable,mergeStateStatus,headRefOid,headRefName,statusCheckRollup,labels)

            state=$(jq -r '.state' <<<"$data")
            draft=$(jq -r '.isDraft' <<<"$data")
            base=$(jq -r '.baseRefName' <<<"$data")
            mergeable=$(jq -r '.mergeable' <<<"$data")
            merge_state=$(jq -r '.mergeStateStatus' <<<"$data")
            head=$(jq -r '.headRefOid' <<<"$data")
            head_ref=$(jq -r '.headRefName' <<<"$data")
            short=${head:0:7}

            local has_ready has_blocked
            has_ready=$(jq -r '[.labels[].name] | index("gate: ready") != null' <<<"$data")
            has_blocked=$(jq -r '[.labels[].name] | index("gate: blocked") != null' <<<"$data")

            [ "$state" = "OPEN" ]          || { echo "skip #$PR: not open (state=$state)"; return 0; }
            [ "$draft" = "false" ]         || { echo "skip #$PR: draft"; return 0; }
            default_branch="${DEFAULT_BRANCH:-main}"
            [ "$base" = "$default_branch" ] || { echo "skip #$PR: base is '$base' (only '$default_branch' auto-merge)"; return 0; }
            [ "$has_ready" = "true" ]      || { echo "skip #$PR: no 'gate: ready'"; return 0; }
            [ "$has_blocked" = "false" ]   || { echo "skip #$PR: 'gate: blocked' present"; return 0; }
            [ "$mergeable" = "MERGEABLE" ] || { echo "skip #$PR: not mergeable ($mergeable)"; return 0; }
            case "$merge_state" in
              BLOCKED|DIRTY|BEHIND)
                echo "skip #$PR: merge state is '$merge_state' (GitHub branch/ruleset requirements not satisfied)"
                return 0
                ;;
            esac

            # `gate: ready` is merge-authorizing only when a top-level gate
            # verdict comment explicitly binds that decision to the CURRENT head
            # SHA. This prevents a stale ready label from approving newer code.
            # Expected reviewer/gate-comment contract:
            #   DECISION: PASS
            #   LABEL: gate: ready
            #   HEAD_SHA: <full current head SHA>
            local comments_json timeline_json latest_ready_for_review_at latest_ready_label_at label_after_ready_for_review ready_for_current_head
            comments_json=$(gh api --paginate --slurp "repos/$REPO/issues/$PR/comments")
            timeline_json=$(gh api --paginate --slurp -H "Accept: application/vnd.github+json" "repos/$REPO/issues/$PR/timeline")
            latest_ready_for_review_at=$(jq -r '
              [.[][]
                | select(.event == "ready_for_review")
                | .created_at]
              | max // ""
            ' <<<"$timeline_json")
            latest_ready_label_at=$(jq -r '
              [.[][]
                | select(.event == "labeled")
                | select((.label.name // "") == "gate: ready")
                | .created_at]
              | max // ""
            ' <<<"$timeline_json")
            label_after_ready_for_review=$(jq -nr \
              --arg cutoff "$latest_ready_for_review_at" \
              --arg label_at "$latest_ready_label_at" '
              if $cutoff == "" then true
              elif $label_at == "" then false
              else ($label_at | fromdateiso8601) > ($cutoff | fromdateiso8601)
              end
            ')
            [ "$label_after_ready_for_review" = "true" ] || {
              echo "skip #$PR: 'gate: ready' label is not newer than latest ready_for_review transition ($latest_ready_for_review_at)"
              return 0
            }
            ready_for_current_head=$(jq -r --arg head "$head" --arg cutoff "$latest_ready_for_review_at" '
              [.[][]
                | (.body // "") as $body
                | select($body | test("(^|\\n)DECISION: (PASS|READY)(\\n|$)"))
                | select($body | contains("LABEL: gate: ready"))
                | select($body | contains("HEAD_SHA: " + $head))
                | select($cutoff == "" or ((.created_at | fromdateiso8601) > ($cutoff | fromdateiso8601)))]
              | length
            ' <<<"$comments_json")
            [ "${ready_for_current_head:-0}" -ge 1 ] || { echo "skip #$PR: no SHA-bound gate-ready verdict for current head $short"; return 0; }

            # Additionally require the LATEST head-bound gate verdict to be a PASS,
            # so a later BLOCK vetoes an earlier PASS even when the `gate: blocked`
            # label write failed to land (this repo's `gh --add-label` can error on
            # the Projects-classic GraphQL path; the comment is the durable record).
            local latest_verdict latest_verdict_pass
            latest_verdict=$(jq -c --arg head "$head" '
              [.[][]
                | select((.body // "") | test("(^|\\n)DECISION: "))
                | select((.body // "") | contains("HEAD_SHA: " + $head))
                | {created_at, body: (.body // "")}]
              | sort_by(.created_at) | last // {}
            ' <<<"$comments_json")
            latest_verdict_pass=$(jq -r '
              if ((.body // "")
                   | (test("(^|\\n)DECISION: (PASS|READY)(\\n|$)")
                      and contains("LABEL: gate: ready")))
              then "yes" else "no" end' <<<"$latest_verdict")
            [ "$latest_verdict_pass" = "yes" ] || { echo "skip #$PR: latest head-bound verdict for $short is not PASS/ready (a later BLOCK vetoes an earlier PASS)"; return 0; }

            # Cooldown: the gate: ready label must have been stable for at least
            # READY_COOLDOWN before merging, so a PASS that a reviewer reverts
            # shortly after cannot be merged on the labeled / workflow_run event
            # before the revert lands -- the transient-PASS race that merged #192
            # and #188 (PASS -> merge within seconds -> BLOCK too late). A merge
            # in the cooldown window waits once on label/CI events, then re-reads
            # GitHub state and re-runs the full gate from scratch. Schedule events
            # still soft-skip here so a broad scheduled reconciliation cannot sleep
            # for many PRs.
            local ready_cooldown=300 now_s label_s ready_age
            now_s=$(date -u +%s)
            label_s=$(date -u -d "$latest_ready_label_at" +%s 2>/dev/null || echo 0)
            ready_age=$(( now_s - label_s ))
            [ "$label_s" -gt 0 ] || { echo "skip #$PR: no parseable 'gate: ready' label time; cannot honor cooldown"; return 0; }
            if [ "$ready_age" -lt "$ready_cooldown" ]; then
              case "$EVENT" in
                pull_request|issues|workflow_run)
                  if [ "${KBOT_WAITED_COOLDOWN:-0}" != "1" ]; then
                    sleep_s=$(( ready_cooldown - ready_age + 5 ))
                    echo "wait #$PR: 'gate: ready' only ${ready_age}s old (< ${ready_cooldown}s cooldown); sleeping ${sleep_s}s, then re-reading current state"
                    sleep "$sleep_s"
                    KBOT_WAITED_COOLDOWN=1 eval_and_merge "$PR"
                    return 0
                  fi
                  ;;
              esac
              echo "skip #$PR: 'gate: ready' only ${ready_age}s old (< ${ready_cooldown}s cooldown); reconciler will retry"
              return 0
            fi

            # Exclude this gate's own workflow runs from the rollup count so the
            # merge job can't deadlock on itself; pr-tests and any real CI count.
            local n_checks n_bad
            n_checks=$(jq -r --argjson gate "$gate_filter" \
              '[(.statusCheckRollup // [])[]
                | select((.workflowName // "") as $w | ($gate | index($w)) == null)]
               | length' <<<"$data")
            n_bad=$(jq -r --argjson gate "$gate_filter" \
              '[(.statusCheckRollup // [])[]
                | select((.workflowName // "") as $w | ($gate | index($w)) == null)
                | ((.conclusion // .state // "") | ascii_upcase)
                | select(. != "SUCCESS" and . != "NEUTRAL" and . != "SKIPPED")]
               | length' <<<"$data")

            [ "${n_bad:-1}" -eq 0 ] || { echo "skip #$PR: $n_bad check(s) not passing yet"; return 0; }

            # Deterministic CI floor MUST be present and green — never treat an
            # empty/absent rollup as passable, or untested code could merge if
            # `PR Tests` is disabled, renamed, or fails to trigger (fail-closed).
            local pt_total pt_ok
            pt_total=$(jq -r '[(.statusCheckRollup // [])[] | select((.workflowName // "") == "PR Tests")] | length' <<<"$data")
            pt_ok=$(jq -r '[(.statusCheckRollup // [])[] | select((.workflowName // "") == "PR Tests") | select(((.conclusion // .state // "") | ascii_upcase) == "SUCCESS")] | length' <<<"$data")
            [ "${pt_total:-0}" -ge 1 ]        || { echo "skip #$PR: required 'PR Tests' check absent (CI floor missing)"; return 0; }
            [ "${pt_total}" -eq "${pt_ok}" ]  || { echo "skip #$PR: 'PR Tests' not all passing ($pt_ok/$pt_total)"; return 0; }

            # Clean up disposable feature branches, but NEVER delete a long-lived
            # integration branch — e.g. a `dev`->`main` PR whose head ref is `dev`.
            local del="--delete-branch"
            case "$head_ref" in main|dev) del="" ;; esac

            echo "merging #$PR @ $short into '$base' ($n_checks check(s) passing, incl. PR Tests $pt_ok/$pt_total; SHA-bound gate verdict present)"
            # Bind the merge to the exact head we just validated: if a commit landed
            # after the gate checks above but before this merge, --match-head-commit
            # aborts instead of merging unreviewed code (closes the validate->merge
            # TOCTOU race that Reset Review Gate would otherwise only catch afterward).
            if gh pr merge "$PR" -R "$REPO" --squash --match-head-commit "$head" $del; then
              gh pr comment "$PR" -R "$REPO" \
                --body "**Merged** by review-gate executor. Gate: open, non-draft, base \`$base\`, mergeable, current-head gate verdict for \`$short\`, $n_checks check(s) passing (incl. \`PR Tests\`), label \`gate: ready\`."
            else
              rc=$?
              echo "merge command failed for #$PR @ $short; not posting merged comment"
              return "$rc"
            fi
          }

          for PR in $PRS; do
            echo "::group::Evaluate PR #$PR"
            eval_and_merge "$PR" || echo "eval error on #$PR (non-fatal)"
            echo "::endgroup::"
          done